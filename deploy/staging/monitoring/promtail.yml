server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-json
    static_configs:
      - targets: [localhost]
        labels:
          job: finance-agent-staging
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            request_id: requestId
            trace_id: traceId
            type: type
      - labels:
          type:
      - structured_metadata:
          request_id:
          trace_id:
