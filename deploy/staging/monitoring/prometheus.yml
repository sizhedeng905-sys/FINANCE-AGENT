global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: finance-agent-api
    metrics_path: /api/metrics
    authorization:
      type: Bearer
      credentials_file: /run/secrets/metrics_token
    static_configs:
      - targets: [backend-api:3001]

  - job_name: staging-backup
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: minio-physical-capacity
    metrics_path: /minio/metrics/v3/cluster/health
    static_configs:
      - targets: [minio:9000]

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
