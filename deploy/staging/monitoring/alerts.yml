groups:
  - name: finance-agent-staging
    rules:
      - alert: FinanceAgentApiUnavailable
        expr: up{job="finance-agent-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Finance Agent API is unavailable

      - alert: FinanceAgentWorkerHeartbeatMissing
        expr: finance_agent_worker_heartbeat_healthy == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Background worker heartbeat is missing

      - alert: FinanceAgentHighServerErrorRate
        expr: sum(rate(finance_agent_http_requests_total{status=~"5.."}[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: API server errors exceed the staging threshold

      - alert: FinanceAgentQueueBacklog
        expr: finance_agent_queue_depth > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: A durable task queue is backlogged

      - alert: FinanceAgentTraceDrops
        expr: increase(finance_agent_trace_spans_total{outcome="dropped"}[10m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: OTLP trace spans are being dropped

      - alert: FinanceAgentProcessMemoryHigh
        expr: process_resident_memory_bytes > 2147483648
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: API resident memory exceeds 2 GiB

      - alert: FinanceAgentLogicalStorageHigh
        expr: finance_agent_storage_capacity_bytes{source="logical_quota",kind="used"} / finance_agent_storage_capacity_bytes{source="logical_quota",kind="total"} > 0.80
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Referenced raw files exceed 80 percent of the provisional logical quota

      - alert: FinanceAgentMinioCapacityMetricsMissing
        expr: absent(minio_cluster_health_capacity_usable_free_bytes) or absent(minio_cluster_health_capacity_usable_total_bytes)
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Independent MinIO physical capacity metrics are unavailable

      # Provisional staging threshold pending H13/H14 approval.
      - alert: FinanceAgentMinioPhysicalStorageLow
        expr: minio_cluster_health_capacity_usable_free_bytes / minio_cluster_health_capacity_usable_total_bytes < 0.30
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: MinIO usable physical free capacity is below 30 percent

      - alert: FinanceAgentBackupFailed
        expr: finance_agent_backup_success == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: The latest linked database and object backup failed

      - alert: FinanceAgentBackupStale
        expr: absent(finance_agent_backup_last_success_timestamp_seconds) or (time() - finance_agent_backup_last_success_timestamp_seconds > 25200)
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: No successful staging backup has completed for seven hours

      - alert: FinanceAgentBackupStrongHashCoverageMissing
        expr: absent(finance_agent_backup_object_strong_hash_unverified_count) or finance_agent_backup_object_strong_hash_unverified_count > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Backup object content is not fully covered by strong hashes

      - alert: FinanceAgentBackupObjectMetadataDigestMismatch
        expr: finance_agent_backup_object_metadata_digest_mismatch_count > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Stored object SHA-256 metadata disagrees with streamed backup content

      - alert: FinanceAgentRestoreDrillStale
        expr: absent(finance_agent_restore_drill_last_success_timestamp_seconds) or (time() - finance_agent_restore_drill_last_success_timestamp_seconds > 2592000)
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: No successful restore drill has been recorded for 30 days

      - alert: FinanceAgentRestoreDrillStrongHashCoverageMissing
        expr: absent(finance_agent_restore_drill_unverified_object_count) or finance_agent_restore_drill_unverified_object_count > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Restore drill did not strongly verify every restored object

      - alert: FinanceAgentTlsCertificateExpiring
        expr: absent(finance_agent_tls_certificate_not_after_timestamp_seconds) or (finance_agent_tls_certificate_not_after_timestamp_seconds - time() < 1209600)
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: A required Staging TLS certificate is missing or expires within 14 days
