global:
  resolve_timeout: 5m

route:
  receiver: target-webhook
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: target-webhook
    webhook_configs:
      - url_file: /run/secrets/alert_webhook_url
        send_resolved: true

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: [alertname]
