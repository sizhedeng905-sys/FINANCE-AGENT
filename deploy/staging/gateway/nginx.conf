worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;
  resolver 127.0.0.11 valid=10s ipv6=off;

  log_format json_combined escape=json '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"path":"$uri",'
    '"status":$status,'
    '"upstream_status":"$upstream_status",'
    '"bytes":$body_bytes_sent,'
    '"latency":$request_time,'
    '"upstream_latency":"$upstream_response_time",'
    '"request_id":"$request_id",'
    '"traceparent":"$sent_http_traceparent"'
  '}';
  access_log /dev/stdout json_combined;
  error_log /dev/stderr warn;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:TLS:10m;
  ssl_session_timeout 10m;
  ssl_session_tickets off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 8443 ssl;
    server_name staging.finance-agent.local;
    # Standard request-scoped error messages can echo the raw request line. Safe diagnostics stay in the access log.
    error_log /dev/null;
    ssl_certificate /run/tls/gateway.crt;
    ssl_certificate_key /run/tls/gateway.key;
    # Multipart framing is allowed through the gateway; the API enforces the exact 50 MiB file limit.
    client_max_body_size 52m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location = /gateway-health {
      access_log off;
      default_type text/plain;
      return 200 'ok';
    }

    location /api/ {
      set $backend_upstream backend-api:3001;
      proxy_pass http://$backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Request-Id $request_id;
      proxy_set_header traceparent $http_traceparent;
      proxy_connect_timeout 5s;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
      proxy_request_buffering on;
      proxy_intercept_errors on;
      error_page 413 = @api_payload_too_large;
      error_page 502 503 504 = @api_unavailable;
    }

    location @api_payload_too_large {
      default_type application/json;
      return 413 '{"code":41301,"message":"文件大小超过上传限制","data":{"requestId":"$request_id"}}';
    }

    location @api_unavailable {
      default_type application/json;
      return 503 '{"code":50301,"message":"服务暂时不可用","data":{"requestId":"$request_id"}}';
    }

    location /ops/grafana/ {
      set $grafana_upstream grafana:3000;
      proxy_pass http://$grafana_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Prefix /ops/grafana;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location / {
      set $frontend_upstream frontend:8080;
      proxy_pass http://$frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  server {
    listen 9443 ssl;
    server_name objects.finance-agent.local;
    error_log /dev/null;
    ssl_certificate /run/tls/gateway.crt;
    ssl_certificate_key /run/tls/gateway.key;
    client_max_body_size 50m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;

    location / {
      set $minio_upstream minio:9000;
      proxy_pass http://$minio_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_connect_timeout 5s;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
      proxy_request_buffering off;
    }
  }
}
