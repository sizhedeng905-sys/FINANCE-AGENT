name: ${COMPOSE_PROJECT_NAME:-finance-agent-staging}

x-backend-environment: &backend-environment
  NODE_ENV: production
  HOST: 0.0.0.0
  PORT: 3001
  JWT_EXPIRES_IN: 30m
  JWT_ISSUER: finance-agent-staging
  JWT_AUDIENCE: finance-agent-api
  JWT_ALGORITHM: HS256
  CORS_ORIGINS: https://staging.finance-agent.local:${STAGING_WEB_PORT:-8443}
  TRUSTED_PROXIES: 172.31.90.10
  SWAGGER_ENABLED: "false"
  FILE_STORAGE_DRIVER: s3
  S3_ENDPOINT: https://objects.finance-agent.local:9443
  S3_REGION: us-east-1
  S3_BUCKET: finance-agent-raw
  S3_FORCE_PATH_STYLE: "true"
  # Safety default pending H13/H14 approval; this is not physical MinIO capacity.
  S3_LOGICAL_QUOTA_BYTES: "1099511627776"
  STORAGE_CAPACITY_MAX_STALENESS_SECONDS: "60"
  S3_PRESIGNED_URL_TTL_SECONDS: "60"
  FILE_SCAN_MODE: clamav
  CLAMAV_HOST: clamav
  CLAMAV_PORT: "3310"
  REQUEST_RATE_LIMIT_STORE: redis
  LOGIN_RATE_LIMIT_STORE: redis
  UPLOAD_ADMISSION_STORE: redis
  LOGIN_RATE_LIMIT_WINDOW_MS: "900000"
  LOGIN_RATE_LIMIT_BLOCK_MS: "900000"
  LOGIN_RATE_LIMIT_LEASE_MS: "30000"
  UPLOAD_ADMISSION_LEASE_MS: "30000"
  REDIS_KEY_PREFIX: finance-agent-staging
  MODEL_EXECUTION_GATE_STORE: redis
  MODEL_QUEUE_WAIT_TIMEOUT_MS: "60000"
  MODEL_EXECUTION_LEASE_MS: "30000"
  MODEL_QUEUE_WAITER_LEASE_MS: "5000"
  MODEL_QUEUE_POLL_MS: "100"
  WORKER_POLL_INTERVAL_MS: "2000"
  WORKER_HEARTBEAT_INTERVAL_MS: "5000"
  WORKER_HEARTBEAT_TTL_MS: "20000"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://tempo:4318/v1/traces
  OTEL_SERVICE_NAME: finance-agent-api
  AI_PROVIDER: mock
  AI_SYSTEM_REGISTRY_PROFILE: mock-safe-v1
  AI_SYSTEM_REGISTRY_STARTUP_MODE: verify
  OCR_PROVIDER: mock
  NODE_EXTRA_CA_CERTS: /run/tls/ca.crt

x-backend-common: &backend-common
  image: ${BACKEND_IMAGE:-finance-agent/backend:b8-09}
  build:
    context: ../../backend
    dockerfile: Dockerfile
    args:
      NODE_IMAGE: ${NODE_IMAGE:-node:24.18.0-bookworm-slim@sha256:6f7b03f7c2c8e2e784dcf9295400527b9b1270fd37b7e9a7285cf83b6951452d}
      BUILD_GIT_SHA: ${BUILD_GIT_SHA:-unverified}
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp:size=256m,mode=1770,noexec,nosuid,nodev
    - /app/.upload-quarantine:size=512m,mode=0700,noexec,nosuid,nodev,uid=10001,gid=10001
  cap_drop: [ALL]
  security_opt:
    - no-new-privileges:true
  environment: *backend-environment
  secrets:
    - runtime_database_url
    - jwt_secret
    - redis_url
    - s3_access_key_id
    - s3_secret_access_key
    - metrics_token
  volumes:
    - ./.runtime/tls/ca.crt:/run/tls/ca.crt:ro
  networks:
    - app
    - observability

services:
  postgres:
    image: ${POSTGRES_IMAGE:-finance-agent/staging-postgres:b8-09}
    build:
      context: ./postgres
      args:
        DEBIAN_IMAGE: ${DEBIAN_IMAGE:-debian:bookworm-slim@sha256:7b140f374b289a7c2befc338f42ebe6441b7ea838a042bbd5acbfca6ec875818}
        POSTGRES_PACKAGE_VERSION: ${POSTGRES_PACKAGE_VERSION:-17.10-1.pgdg12+1}
        POSTGRES_COMMON_VERSION: ${POSTGRES_COMMON_VERSION:-293.pgdg12+1}
        LIBPQ_PACKAGE_VERSION: ${LIBPQ_PACKAGE_VERSION:-18.4-1.pgdg12+1}
        POSTGRES_ENTRYPOINT_SHA256: ${POSTGRES_ENTRYPOINT_SHA256:-9c440299ae04a0a79d55b8bf03307036d890a40979d2fb698073c9050d4b20a5}
        BUILD_GIT_SHA: ${BUILD_GIT_SHA:-unverified}
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/opt/staging/postgres-entrypoint.sh"]
    command:
      - postgres
      - -c
      - listen_addresses=*
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/var/lib/postgresql/tls/server.crt
      - -c
      - ssl_key_file=/var/lib/postgresql/tls/server.key
      - -c
      - ssl_ca_file=/var/lib/postgresql/tls/ca.crt
      - -c
      - ssl_min_protocol_version=TLSv1.2
      - -c
      - password_encryption=scram-sha-256
      - -c
      - archive_mode=on
      - -c
      - archive_timeout=300s
      - -c
      - archive_command=test ! -f /backups/wal/%f && cp %p /backups/wal/%f
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_superuser_password
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=trust
    secrets:
      - postgres_superuser_password
      - migration_password
      - runtime_password
      - backup_password
      - restore_password
      - postgres_tls_cert
      - postgres_tls_key
      - staging_ca_cert
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - backup_data:/backups
      - ./postgres/postgres-entrypoint.sh:/opt/staging/postgres-entrypoint.sh:ro
      - ./postgres/01-init-roles.sh:/docker-entrypoint-initdb.d/01-init-roles.sh:ro
      - ./postgres/provision-restore-role.sh:/opt/staging/provision-restore-role.sh:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          PGPASSWORD=$$(cat /run/secrets/migration_password)
          psql "host=postgres port=5432 dbname=finance_agent_staging user=finance_migrator sslmode=verify-full sslrootcert=/run/secrets/staging_ca_cert connect_timeout=3"
          --tuples-only --no-align --command "SELECT 1" | grep -qx 1
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app

  redis:
    image: ${REDIS_IMAGE:-redis:8.2.3-alpine@sha256:08ad0b1d280850169a790dba1393ff7a90aef951fc19632cf4d3ce4f78e679ba}
    restart: unless-stopped
    user: "999:1000"
    entrypoint: ["/bin/sh", "/opt/staging/redis-entrypoint.sh"]
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
      - ./redis/redis-entrypoint.sh:/opt/staging/redis-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$(cat /run/secrets/redis_password) redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    networks:
      - app

  clamav:
    image: ${CLAMAV_IMAGE:-clamav/clamav:1.4.3@sha256:75fb5fd95fcbe1d7e6d240c369c1572b686ee2c95949d1042b5148de8eddebb4}
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "printf 'PING\\n' | nc -w 2 127.0.0.1 3310 | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 90s
    networks:
      - app
      - edge

  minio:
    image: ${MINIO_IMAGE:-finance-agent/staging-minio:b8-09}
    build:
      context: ./minio
      args:
        GO_IMAGE: ${GO_IMAGE:-golang:1.26.5-bookworm@sha256:1ecb7edf62a0408027bd5729dfd6b1b8766e578e8df93995b225dfd0944eb651}
        DEBIAN_IMAGE: ${DEBIAN_IMAGE:-debian:bookworm-slim@sha256:7b140f374b289a7c2befc338f42ebe6441b7ea838a042bbd5acbfca6ec875818}
        BUILD_GIT_SHA: ${BUILD_GIT_SHA:-unverified}
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MINIO_BROWSER_REDIRECT_URL: https://objects.finance-agent.local:${STAGING_OBJECT_PORT:-9443}/console/
      # Metrics remain anonymous only on the private app network; the gateway blocks these paths.
      MINIO_PROMETHEUS_AUTH_TYPE: public
    secrets:
      - minio_root_user
      - minio_root_password
    volumes:
      - minio_data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1770,uid=10001,gid=10001
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    networks:
      - app

  minio-init:
    image: ${BACKUP_IMAGE:-finance-agent/staging-backup:b8-09}
    restart: "no"
    entrypoint: ["/bin/sh", "/opt/staging/minio-init.sh"]
    depends_on:
      minio:
        condition: service_healthy
    secrets:
      - minio_root_user
      - minio_root_password
      - s3_access_key_id
      - s3_secret_access_key
    volumes:
      - ./minio/init.sh:/opt/staging/minio-init.sh:ro
      - ./minio/runtime-policy.json:/opt/staging/runtime-policy.json:ro
    networks:
      - app

  frontend:
    image: ${FRONTEND_IMAGE:-finance-agent/frontend:b8-09}
    build:
      context: ../..
      dockerfile: Dockerfile.frontend
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:24.18.0-bookworm-slim@sha256:6f7b03f7c2c8e2e784dcf9295400527b9b1270fd37b7e9a7285cf83b6951452d}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.30.4-alpine3.24@sha256:97d490c12ba55b4946b01546d1c3ed324e8d41ab1c9fcb2a616aa470620e5b46}
        BUILD_GIT_SHA: ${BUILD_GIT_SHA:-unverified}
        VITE_APP_DATA_MODE: api
        VITE_API_BASE_URL: /api
        VITE_API_TIMEOUT_MS: "15000"
    restart: unless-stopped
    entrypoint: ["nginx", "-g", "daemon off;"]
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=32m,mode=0770,uid=101,gid=101
      - /var/run:size=4m,mode=0770,uid=101,gid=101
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app

  gateway:
    image: ${NGINX_IMAGE:-nginx:1.30.4-alpine3.24@sha256:97d490c12ba55b4946b01546d1c3ed324e8d41ab1c9fcb2a616aa470620e5b46}
    restart: unless-stopped
    user: "101:101"
    entrypoint: ["nginx", "-g", "daemon off;"]
    read_only: true
    ports:
      - 127.0.0.1:${STAGING_WEB_PORT:-8443}:8443
      - 127.0.0.1:${STAGING_OBJECT_PORT:-9443}:9443
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./.runtime/tls/gateway.crt:/run/tls/gateway.crt:ro
      - ./.runtime/tls/gateway.key:/run/tls/gateway.key:ro
    tmpfs:
      - /var/cache/nginx:size=32m,mode=0770,uid=101,gid=101
      - /var/run:size=4m,mode=0770,uid=101,gid=101
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    depends_on:
      frontend:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -q -O - https://127.0.0.1:8443/gateway-health | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      app:
        ipv4_address: 172.31.90.10
        aliases:
          - staging.finance-agent.local
          - objects.finance-agent.local
      observability: {}
      edge: {}

  migrate:
    <<: *backend-common
    restart: "no"
    environment:
      NODE_ENV: production
      AI_SYSTEM_REGISTRY_PROFILE: mock-safe-v1
      AI_SYSTEM_REGISTRY_STARTUP_MODE: verify
      DATABASE_URL_FILE: /run/secrets/migration_database_url
    secrets:
      - migration_database_url
      - staging_seed_password
    command:
      - sh
      - -c
      - ./node_modules/.bin/prisma migrate deploy && ./node_modules/.bin/prisma db execute --file prisma/runtime-grants.sql --schema prisma/schema.prisma && node dist/system-bootstrap.js && ALLOW_STAGING_SEED=true STAGING_SEED_PASSWORD_FILE=/run/secrets/staging_seed_password node dist/staging-seed.js
    depends_on:
      postgres:
        condition: service_healthy

  backend-api:
    <<: *backend-common
    environment:
      <<: *backend-environment
      PROCESS_ROLE: api
      DATABASE_URL_FILE: /run/secrets/runtime_database_url
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      REDIS_URL_FILE: /run/secrets/redis_url
      S3_ACCESS_KEY_ID_FILE: /run/secrets/s3_access_key_id
      S3_SECRET_ACCESS_KEY_FILE: /run/secrets/s3_secret_access_key
      METRICS_TOKEN_FILE: /run/secrets/metrics_token
    command: ["node", "dist/main.js"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      gateway:
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health/ready').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 10s
      timeout: 5s
      retries: 30

  worker:
    <<: *backend-common
    environment:
      <<: *backend-environment
      PROCESS_ROLE: worker
      DATABASE_URL_FILE: /run/secrets/runtime_database_url
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      REDIS_URL_FILE: /run/secrets/redis_url
      S3_ACCESS_KEY_ID_FILE: /run/secrets/s3_access_key_id
      S3_SECRET_ACCESS_KEY_FILE: /run/secrets/s3_secret_access_key
      METRICS_TOKEN_FILE: /run/secrets/metrics_token
      OTEL_SERVICE_NAME: finance-agent-worker
    command: ["node", "dist/worker.js"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      gateway:
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "REDIS_URL=$$(cat /run/secrets/redis_url) node -e \"const{createClient}=require('redis');const c=createClient({url:process.env.REDIS_URL});c.connect().then(()=>c.ping()).then(()=>c.quit()).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20

  backup:
    image: ${BACKUP_IMAGE:-finance-agent/staging-backup:b8-09}
    build:
      context: ./backup
      args:
        DEBIAN_IMAGE: ${DEBIAN_IMAGE:-debian:bookworm-slim@sha256:7b140f374b289a7c2befc338f42ebe6441b7ea838a042bbd5acbfca6ec875818}
        POSTGRES_PACKAGE_VERSION: ${POSTGRES_PACKAGE_VERSION:-17.10-1.pgdg12+1}
        POSTGRES_COMMON_VERSION: ${POSTGRES_COMMON_VERSION:-293.pgdg12+1}
        LIBPQ_PACKAGE_VERSION: ${LIBPQ_PACKAGE_VERSION:-18.4-1.pgdg12+1}
        GO_IMAGE: ${GO_IMAGE:-golang:1.26.5-bookworm@sha256:1ecb7edf62a0408027bd5729dfd6b1b8766e578e8df93995b225dfd0944eb651}
        MC_SOURCE_COMMIT: ${MC_SOURCE_COMMIT:-77f82e18b5401a65958f1619df6ebb994634bd88}
        MC_SOURCE_SHA256: ${MC_SOURCE_SHA256:-167415edd21bc29f5360943dac64272aa5cda0a39f3070b15cfeca671c43d975}
        MC_SOURCE_VERSION: ${MC_SOURCE_VERSION:-SOURCE.2025-11-06T16-25-29Z}
        MC_SOURCE_SHORT_COMMIT: ${MC_SOURCE_SHORT_COMMIT:-77f82e18b540}
        BUILD_GIT_SHA: ${BUILD_GIT_SHA:-unverified}
    restart: unless-stopped
    environment:
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-21600}
      HOME: /tmp/backup-home
      MC_CONFIG_DIR: /tmp/backup-home/.mc
      BACKUP_DATABASE_URL_FILE: /run/secrets/backup_database_url
      MIGRATION_DATABASE_URL_FILE: /run/secrets/migration_database_url
      RESTORE_DATABASE_URL_FILE: /run/secrets/restore_database_url
      MINIO_ENDPOINT: http://minio:9000
      BACKUP_SOURCE_ENVIRONMENT_ID: ${BACKUP_SOURCE_ENVIRONMENT_ID:-finance-agent-staging-local}
      IMAGE_IDENTITY_POLICY: ${IMAGE_IDENTITY_POLICY:-local_identity}
      BACKUP_METRICS_FILE: /metrics/finance_agent_backup.prom
    secrets:
      - backup_database_url
      - migration_database_url
      - restore_database_url
      - minio_root_user
      - minio_root_password
    volumes:
      - backup_data:/backups
      - backup_metrics:/metrics
      - ./.runtime/tls/ca.crt:/run/tls/ca.crt:ro
    tmpfs:
      - /tmp:size=32m,mode=1770,uid=999,gid=999
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks:
      - app

  prometheus:
    image: ${PROMETHEUS_IMAGE:-finance-agent/staging-prometheus:b8-09}
    build:
      context: ./prometheus
      args:
        GO_IMAGE: ${GO_IMAGE:-golang:1.26.5-bookworm@sha256:1ecb7edf62a0408027bd5729dfd6b1b8766e578e8df93995b225dfd0944eb651}
        NODE_IMAGE: ${NODE_IMAGE:-node:24.18.0-bookworm-slim@sha256:6f7b03f7c2c8e2e784dcf9295400527b9b1270fd37b7e9a7285cf83b6951452d}
        DEBIAN_IMAGE: ${DEBIAN_IMAGE:-debian:bookworm-slim@sha256:7b140f374b289a7c2befc338f42ebe6441b7ea838a042bbd5acbfca6ec875818}
        BUILD_GIT_SHA: ${BUILD_GIT_SHA:-unverified}
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    secrets:
      - metrics_token
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1770,uid=10001,gid=10001
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend-api:
        condition: service_healthy
    networks:
      - observability
      - app

  alertmanager:
    image: ${ALERTMANAGER_IMAGE:-finance-agent/staging-alertmanager:b8-09}
    build:
      context: ./alertmanager
      args:
        GO_IMAGE: ${GO_IMAGE:-golang:1.26.5-bookworm@sha256:1ecb7edf62a0408027bd5729dfd6b1b8766e578e8df93995b225dfd0944eb651}
        DEBIAN_IMAGE: ${DEBIAN_IMAGE:-debian:bookworm-slim@sha256:7b140f374b289a7c2befc338f42ebe6441b7ea838a042bbd5acbfca6ec875818}
        BUILD_GIT_SHA: ${BUILD_GIT_SHA:-unverified}
    restart: unless-stopped
    command: ["--config.file=/etc/alertmanager/alertmanager.yml", "--storage.path=/alertmanager"]
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1770,uid=10001,gid=10001
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    networks:
      - observability

  node-exporter:
    image: ${NODE_EXPORTER_IMAGE:-finance-agent/staging-node-exporter:b8-09}
    build:
      context: ./node-exporter
      args:
        GO_IMAGE: ${GO_IMAGE:-golang:1.26.5-bookworm@sha256:1ecb7edf62a0408027bd5729dfd6b1b8766e578e8df93995b225dfd0944eb651}
        DEBIAN_IMAGE: ${DEBIAN_IMAGE:-debian:bookworm-slim@sha256:7b140f374b289a7c2befc338f42ebe6441b7ea838a042bbd5acbfca6ec875818}
        BUILD_GIT_SHA: ${BUILD_GIT_SHA:-unverified}
    restart: unless-stopped
    command:
      - --collector.textfile.directory=/backup-metrics
      - --collector.textfile.directory=/tls-metrics
    volumes:
      - backup_metrics:/backup-metrics:ro
      - ./.runtime/metrics:/tls-metrics:ro
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    networks:
      - observability

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.6.12@sha256:2483b71b28b15dee230f85512cae2b20c4b5f6e98a6eabe686cbccfa5ea3ba4a}
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./monitoring/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - observability

  alloy:
    image: ${ALLOY_IMAGE:-finance-agent/staging-alloy:b8-09}
    build:
      context: ./alloy
      args:
        GO_IMAGE: ${GO_IMAGE:-golang:1.26.5-bookworm@sha256:1ecb7edf62a0408027bd5729dfd6b1b8766e578e8df93995b225dfd0944eb651}
        DEBIAN_IMAGE: ${DEBIAN_IMAGE:-debian:bookworm-slim@sha256:7b140f374b289a7c2befc338f42ebe6441b7ea838a042bbd5acbfca6ec875818}
        BUILD_GIT_SHA: ${BUILD_GIT_SHA:-unverified}
    restart: unless-stopped
    command: ["run", "/etc/alloy/config.alloy", "--storage.path=/var/lib/alloy/data"]
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./monitoring/alloy.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - alloy_data:/var/lib/alloy/data
    tmpfs:
      - /tmp:size=16m,mode=1777
    depends_on:
      - loki
    networks:
      - observability

  tempo:
    image: ${TEMPO_IMAGE:-finance-agent/staging-tempo:b8-09}
    build:
      context: ./tempo
      args:
        GO_IMAGE: ${GO_IMAGE:-golang:1.26.5-bookworm@sha256:1ecb7edf62a0408027bd5729dfd6b1b8766e578e8df93995b225dfd0944eb651}
        DEBIAN_IMAGE: ${DEBIAN_IMAGE:-debian:bookworm-slim@sha256:7b140f374b289a7c2befc338f42ebe6441b7ea838a042bbd5acbfca6ec875818}
        BUILD_GIT_SHA: ${BUILD_GIT_SHA:-unverified}
    restart: unless-stopped
    command: ["--config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./monitoring/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1770,uid=10001,gid=10001
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    networks:
      - observability
      - app

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:12.4.4@sha256:378f94b054e5384cd74322cbf7542cff6a43e068e4011f81ea5e75323247df02}
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: staging-admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_SERVER_ROOT_URL: https://staging.finance-agent.local:${STAGING_WEB_PORT:-8443}/ops/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    secrets:
      - grafana_admin_password
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - observability

networks:
  edge: {}
  app:
    internal: true
    ipam:
      config:
        - subnet: 172.31.90.0/24
  observability:
    internal: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:
  backup_data:
  backup_metrics:
  prometheus_data:
  alertmanager_data:
  loki_data:
  tempo_data:
  grafana_data:
  alloy_data:

secrets:
  postgres_superuser_password:
    file: ./.secrets/postgres_superuser_password
  migration_password:
    file: ./.secrets/migration_password
  runtime_password:
    file: ./.secrets/runtime_password
  backup_password:
    file: ./.secrets/backup_password
  restore_password:
    file: ./.secrets/restore_password
  migration_database_url:
    file: ./.secrets/migration_database_url
  runtime_database_url:
    file: ./.secrets/runtime_database_url
  backup_database_url:
    file: ./.secrets/backup_database_url
  restore_database_url:
    file: ./.secrets/restore_database_url
  jwt_secret:
    file: ./.secrets/jwt_secret
  redis_password:
    file: ./.secrets/redis_password
  redis_url:
    file: ./.secrets/redis_url
  minio_root_user:
    file: ./.secrets/minio_root_user
  minio_root_password:
    file: ./.secrets/minio_root_password
  s3_access_key_id:
    file: ./.secrets/s3_access_key_id
  s3_secret_access_key:
    file: ./.secrets/s3_secret_access_key
  metrics_token:
    file: ./.secrets/metrics_token
  grafana_admin_password:
    file: ./.secrets/grafana_admin_password
  staging_seed_password:
    file: ./.secrets/staging_seed_password
  postgres_tls_cert:
    file: ./.runtime/tls/postgres.crt
  postgres_tls_key:
    file: ./.runtime/tls/postgres.key
  staging_ca_cert:
