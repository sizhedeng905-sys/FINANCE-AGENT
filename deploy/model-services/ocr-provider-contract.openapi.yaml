openapi: 3.1.0
info:
  title: FINANCE-AGENT Local OCR Provider Contract
  version: 1.0.0
paths:
  /health:
    get:
      responses:
        "200":
          description: Provider is ready.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, const: ok }
                  model: { type: string }
                  version: { type: string }
  /ocr:
    post:
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, documentId, templateFields]
              properties:
                file: { type: string, format: binary }
                documentId: { type: string }
                templateFields:
                  type: string
                  description: JSON array of allowed template field definitions.
      responses:
        "200":
          description: Provider-neutral OCR result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OcrResult"
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }
  schemas:
    OcrResult:
      type: object
      additionalProperties: false
      required: [documentId, extractedText, fieldCandidates]
      properties:
        documentId: { type: string }
        extractedText: { type: string }
        pages: { type: array, items: { type: object, additionalProperties: true } }
        textBlocks: { type: array, items: { type: object, additionalProperties: true } }
        tables: { type: array, items: { type: object, additionalProperties: true } }
        rawResult: { type: object, additionalProperties: true }
        rawResultRef: { type: string }
        fieldCandidates:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [sourceLabel, rawValue, normalizedValue, page, confidence, evidence]
            properties:
              targetFieldId: { type: string }
              targetFieldKey: { type: string }
              sourceLabel: { type: string }
              rawValue: {}
              normalizedValue: {}
              page: { type: integer, minimum: 1 }
              boundingBox:
                type: object
                properties:
                  x: { type: number }
                  y: { type: number }
                  width: { type: number }
                  height: { type: number }
              confidence: { type: number, minimum: 0, maximum: 1 }
              evidence: { type: string }
